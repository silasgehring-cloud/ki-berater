version: 2

updates:
  # Backend (Python)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 5
    labels:
      - "deps"
      - "python"
    groups:
      backend-minor-and-patch:
        update-types: ["minor", "patch"]

  # WordPress plugin
  - package-ecosystem: "composer"
    directory: "/plugin/ki-berater"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 3
    labels:
      - "deps"
      - "php"

  # GitHub Actions themselves (security pins)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "deps"
      - "ci"

  # Docker base images
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "deps"
      - "docker"
