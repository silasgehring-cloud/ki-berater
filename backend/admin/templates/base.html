<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <title>{% block title %}Admin · KI-Berater{% endblock %}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/admin/static/admin.css" />
  <script src="https://unpkg.com/htmx.org@2.0.4" defer></script>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <span class="mark">k</span>
        <span>KI-Berater</span>
      </div>
      <nav>
        <a href="/admin/" class="{% if active == 'dashboard' %}active{% endif %}">Dashboard</a>
        <a href="/admin/shops" class="{% if active == 'shops' %}active{% endif %}">Shops</a>
        <a href="/admin/conversations" class="{% if active == 'conversations' %}active{% endif %}">Conversations</a>
        <a href="/admin/health" class="{% if active == 'health' %}active{% endif %}">System</a>
      </nav>
      <div class="spacer"></div>
      <form method="post" action="/admin/logout" style="margin: 0;">
        <button type="submit" class="logout">Abmelden</button>
      </form>
      <div class="mono" style="font-size: 10px; color: rgba(255,255,255,0.35);">v{{ api_version }}</div>
    </aside>

    <main class="main">
      {% block content %}{% endblock %}
    </main>
  </div>
</body>
</html>
